name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# SDK 是供开发者嵌入的库代码,不打包成二进制 / 不部署.
# CI 只做轻量的语法 / 类型 / 静态检查 + 单元测试(跨语言 fixture 一致性验证).

jobs:
  # ============ Go — vet + test ============
  go:
    name: Go ${{ matrix.go-version }} · vet + test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.21', '1.22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: go vet
        working-directory: go
        run: go vet ./
      - name: go test (signature parity)
        working-directory: go
        run: go test -v ./...

  # ============ Node.js — syntax + node:test ============
  node:
    name: Node.js ${{ matrix.node-version }} · syntax + test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: node --check (syntax)
        working-directory: node
        run: |
          node --check index.js
          for f in src/*.js src/namespaces/*.js examples/*.js test/*.js; do
            node --check "$f"
          done
      - name: TypeScript .d.ts type check
        working-directory: node
        run: |
          npm install --no-save --silent typescript@5
          npx tsc --noEmit --strict index.d.ts
      - name: node --test (signature parity)
        working-directory: node
        run: node --test test/*.test.js

  # ============ Python — import + unittest ============
  python:
    name: Python ${{ matrix.python-version }} · import + test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.10', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install runtime deps
        run: pip install requests
      - name: Import check
        working-directory: python
        run: python -c "import nexcore; print('nexcore.Client OK')"
      - name: Syntax check examples
        working-directory: python
        run: |
          for f in examples/*.py; do
            python -m py_compile "$f"
          done
      - name: unittest (signature parity)
        working-directory: python
        run: python -m unittest discover tests -v

  # ============ PHP — php -l + signature parity test ============
  php:
    name: PHP ${{ matrix.php-version }} · lint + test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['7.4', '8.1', '8.3']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: curl, json, openssl
      - name: php -l (src + examples + tests)
        working-directory: php
        run: |
          find src -name '*.php' -exec php -l {} \;
          for f in examples/*.php tests/*.php; do php -l "$f"; done
      - name: php run signature parity test
        working-directory: php
        run: php tests/PaymentSignTest.php
