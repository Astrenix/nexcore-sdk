name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# SDK 是供开发者嵌入的库代码,不打包成二进制 / 不部署。
# CI 只做轻量的语法 / 类型 / 静态检查,确保代码能被开发者正常 import 与调用。

jobs:
  # ============ Go — vet 静态检查 ============
  go:
    name: Go ${{ matrix.go-version }} · vet
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.21', '1.22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: go vet (SDK package only)
        working-directory: go
        run: go vet ./

  # ============ Node.js — 语法 + 类型 ============
  node:
    name: Node.js ${{ matrix.node-version }} · syntax
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['16', '18', '20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: node --check (syntax)
        working-directory: node
        run: |
          node --check index.js
          for f in examples/*.js; do node --check "$f"; done
      - name: TypeScript .d.ts type check
        working-directory: node
        run: |
          npm install --no-save --silent typescript@5
          npx tsc --noEmit --strict index.d.ts

  # ============ Python — import + py_compile ============
  python:
    name: Python ${{ matrix.python-version }} · import
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.10', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install runtime deps
        run: pip install requests
      - name: Import check
        working-directory: python
        run: python -c "import nexcore; print('nexcore.Client OK')"
      - name: Syntax check examples
        working-directory: python
        run: |
          for f in examples/*.py; do
            python -m py_compile "$f"
          done

  # ============ PHP — php -l 语法检查 ============
  php:
    name: PHP ${{ matrix.php-version }} · lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['7.4', '8.1', '8.3']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: curl, json
      - name: php -l Client.php
        working-directory: php
        run: php -l Client.php
      - name: php -l examples/*.php
        working-directory: php
        run: |
          for f in examples/*.php; do php -l "$f"; done
